name: Build wheels

on:
  push:
    tags:
      - "v*"
  pull_request:          # build (but don't publish) on PRs for validation
  workflow_dispatch:     # allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build wheels for Linux / macOS / Windows ──────────────────────────
  build-wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install cibuildwheel
        run: uv pip install --system cibuildwheel==2.21.*

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ── Build the source distribution ─────────────────────────────────────
  build-sdist:
    name: Source dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install build deps
        run: |
          sudo apt-get update && sudo apt-get install -y libfftw3-dev
          git clone --depth 1 https://github.com/wooters/miniDSP.git /tmp/miniDSP

      - name: Bundle C source into vendor/
        run: cp -r /tmp/miniDSP vendor/miniDSP

      - name: Build sdist
        run: uv build --sdist

      - name: Validate package metadata
        run: |
          uv pip install --system twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish pre-releases to TestPyPI ──────────────────────────────────
  publish-test:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && (contains(github.ref, 'rc') || contains(github.ref, 'a') || contains(github.ref, 'b'))
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Publish stable releases to PyPI ─────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && !contains(github.ref, 'rc')
      && !contains(github.ref, 'a')
      && !contains(github.ref, 'b')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
