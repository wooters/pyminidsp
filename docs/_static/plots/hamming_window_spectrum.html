      title: { text: 'Hamming Window - Magnitude Response', font: { size: 13 } },
      xaxis: { title: 'Normalized Frequency (cycles/sample)', range: [0, 0.5] },
      yaxis: { title: 'Magnitude (dB)', range: [-120, 5] },
      margin: { t: 35, r: 20, b: 50, l: 60 },
      height: 360
    }, { responsive: true });
  </script>
</body>
