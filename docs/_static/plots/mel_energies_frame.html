<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mel Energies (One Frame Example)</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fafafa; }
  </style>
</head>
<body>
  <div id="plot"></div>
  <script>
    const centers = [53.136333,108.54273,168.29262,232.57051,301.44129,375.3778,454.82132,540.13107,631.71328,730.12192,835.85913,949.30183,1071.0935,1201.9554,1342.479,1493.3658,1655.3991,1829.4173,2016.3075,2216.9576,2432.4501,2663.8715,2912.3973,3179.2708,3465.8528,3773.6014];

    Plotly.newPlot('plot', [{
      x: centers, y: energies,
      type: 'bar',
      marker: { color: '#2563eb' },
      hovertemplate: 'Center: %{x:.0f} Hz<br>Energy: %{y:.4f}<extra></extra>'

      title: { text: 'Mel Energies (One Frame Example)', font: { size: 13 } },
      xaxis: { title: 'Center Frequency (Hz)' },
      yaxis: { title: 'Energy' },
      margin: { t: 35, r: 20, b: 50, l: 60 },
      height: 360
    }, { responsive: true });
  </script>
</body>
</html>
